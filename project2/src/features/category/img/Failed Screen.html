<script>

  const themeColorSet = (brandSetings = {}) => {
    const { dark_theme_supported, current_theme } = brandSetings;
    const isLocalDarkTheme = window?.matchMedia('(prefers-color-scheme: dark)')?.matches;

    if (dark_theme_supported) {
      if (current_theme) {
        return (current_theme === 'white') ? 'white_theme' : 'dark_theme';
      } else {
        return isLocalDarkTheme ? 'dark_theme' : 'white_theme';
      }
    }
    return 'white_theme';
  }

  const setBrand = () => {
    const brandingData = "";
    const branding = JSON.parse(brandingData || '{}');
    if (Object.keys(branding)?.length) {
      const themeColor = themeColorSet(branding);
      const root = document.querySelector(':root');
      const setVariables = vars => Object.entries(vars).forEach(v => root.style.setProperty(`--${v[0]}`, v?.[1]));
      if (themeColor === 'dark_theme') {
        root.style.setProperty('--secondary_background_color', '#262626');
        root.style.setProperty('--border_color', '#434343');
      }
      const colors = branding?.[themeColor]?.colors;
      !!colors && setVariables(colors);
    }
  }

  setBrand();

  function copyToClipboard() {
    const textToCopy = document.getElementById('copyText').innerText;
    const iconCopy = document.getElementById('copy');
    const iconCopyDone = document.getElementById('copy-done');
    navigator.clipboard.writeText(textToCopy)
      .then(() => {
        iconCopy.style.display = 'none';
        iconCopyDone.style.display = 'block';
        setTimeout(() => {
          iconCopy.style.display = 'block';
          iconCopyDone.style.display = 'none';
        }, 1000)
      })
      .catch((err) => {
        console.error('Unable to copy text to clipboard', err);
      });
  }
</script>
